services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - oneleague
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneleague"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    networks:
      - oneleague
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: oneleague
      DB_USERNAME: oneleague
      DB_PASSWORD: secret

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - oneleague
    depends_on:
      - api

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    networks:
      - oneleague

networks:
  oneleague:
    driver: bridge

volumes:
  postgres_data:
