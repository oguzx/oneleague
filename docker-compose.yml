services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./api/.env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-oneleague}
      POSTGRES_USER: ${DB_USERNAME:-oneleague}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - oneleague
    healthcheck:
      test: ["CMD-SHELL", "psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - ./api/.env
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    networks:
      - oneleague
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9000' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - oneleague
    depends_on:
      api:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - oneleague
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=0
    restart: on-failure
    env_file:
      - ./api/.env
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    networks:
      - oneleague
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    networks:
      - oneleague

networks:
  oneleague:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
