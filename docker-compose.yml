services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - oneleague
    healthcheck:
      test: ["CMD-SHELL", "psql -U oneleague -d oneleague -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - ./api/.env
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    networks:
      - oneleague
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - oneleague
    depends_on:
      - api

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: php artisan queue:work --tries=3 --timeout=120
    restart: on-failure
    env_file:
      - ./api/.env
    volumes:
      - ./api:/var/www/html
      - /var/www/html/vendor
    networks:
      - oneleague
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    networks:
      - oneleague

networks:
  oneleague:
    driver: bridge

volumes:
  postgres_data:
